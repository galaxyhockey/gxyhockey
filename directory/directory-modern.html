<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gxygle — Search Biking People World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#fff;color:#202124;min-height:100vh;}
.topbar{display:flex;justify-content:flex-end;gap:1rem;padding:1rem 1.5rem;font-size:.85rem;align-items:center;}
.toggle{border:1px solid #dadce0;border-radius:20px;overflow:hidden;display:inline-flex;font-size:.8rem;}
.toggle a,.toggle span{padding:.35rem .9rem;text-decoration:none;color:#5f6368;}
.toggle .on{background:#1a73e8;color:#fff;}
.wrap{max-width:640px;margin:0 auto;padding:1rem 1.5rem 3rem;}
.center{text-align:center;}
.logo{font-size:3.2rem;font-weight:700;letter-spacing:-2px;margin:2.5rem 0 .3rem;}
.logo .b1{color:#4285F4;}.logo .r{color:#DB4437;}.logo .y{color:#F4B400;}.logo .g{color:#0F9D58;}
.logo sup{font-size:.9rem;color:#5f6368;font-weight:400;}
.subtitle{color:#5f6368;font-size:.95rem;margin-bottom:2rem;}
.searchbox{display:flex;align-items:center;border:1px solid #dfe1e5;border-radius:24px;padding:.7rem 1.2rem;box-shadow:0 1px 6px rgba(32,33,36,.1);max-width:560px;margin:0 auto 1.3rem;}
.searchbox:focus-within{box-shadow:0 1px 10px rgba(32,33,36,.2);}
.searchbox svg{width:20px;height:20px;fill:#9aa0a6;margin-right:.8rem;flex:none;}
.searchbox input{border:none;outline:none;flex:1;font-size:1rem;background:transparent;}
.btns{display:flex;gap:.7rem;justify-content:center;margin-bottom:.5rem;}
.btns button{background:#f8f9fa;border:1px solid #f8f9fa;border-radius:6px;color:#3c4043;font-size:.88rem;padding:.6rem 1.1rem;cursor:pointer;}
.btns button:hover{border-color:#dadce0;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.tips{text-align:center;color:#70757a;font-size:.85rem;margin-top:.8rem;}
.tips a{color:#1a73e8;text-decoration:none;}
.tabs{display:flex;gap:.4rem;flex-wrap:wrap;border-bottom:1px solid #ebebeb;margin:1.5rem 0 1rem;padding-bottom:.5rem;}
.tabs button{background:none;border:none;color:#5f6368;font-size:.9rem;padding:.4rem .7rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-.5rem;}
.tabs button.on{color:#1a73e8;border-bottom-color:#1a73e8;font-weight:600;}
.rstat{color:#70757a;font-size:.85rem;margin-bottom:1.2rem;}
.result{margin-bottom:1.5rem;}
.result .url{color:#202124;font-size:.82rem;display:flex;align-items:center;gap:.4rem;}
.result .pill{font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;padding:.1rem .45rem;border-radius:4px;font-weight:700;}
.p-news{background:#e8f0fe;color:#1967d2;}.p-business{background:#e6f4ea;color:#188038;}.p-store{background:#fef7e0;color:#b06000;}.p-station{background:#fce8e6;color:#c5221f;}.p-page{background:#f1f3f4;color:#5f6368;}
.result a.title{color:#1a0dab;font-size:1.2rem;text-decoration:none;display:inline-block;margin:.15rem 0;}
.result a.title:hover{text-decoration:underline;}
.result .desc{color:#4d5156;font-size:.9rem;line-height:1.5;}
.result .meta{color:#5f6368;font-size:.8rem;}
.foot{text-align:center;color:#70757a;font-size:.82rem;padding:2rem 1rem;border-top:1px solid #ebebeb;margin-top:2rem;}
.foot a{color:#5f6368;}
</style>
</head>
<body>
<div class="topbar"><div class="toggle"><a href="index.html">2000s</a><span class="on">Modern</span></div></div>
<div class="wrap">
  <div class="center">
    <div class="logo"><span class="b1">G</span><span class="r">x</span><span class="y">y</span><span class="b1">g</span><span class="g">l</span><span class="r">e</span><sup>bpw</sup></div>
    <div class="subtitle">Search everything in Biking People World — news, businesses, shops, and transit</div>
    <div class="searchbox">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <input type="text" id="q" placeholder="Search Biking People World…" autocomplete="off">
    </div>
    <div class="btns"><button onclick="doSearch()">Gxygle Search</button><button onclick="feelingLucky()">I'm Feeling Lucky</button></div>
    <div class="tips" id="tips">Try <a href="javascript:void(0)" onclick="qq('minigame land')">minigame land</a> · <a href="javascript:void(0)" onclick="qq('weather')">weather</a> · <a href="javascript:void(0)" onclick="qq('pizza')">pizza</a> · <a href="javascript:void(0)" onclick="qq('piglin plaza')">piglin plaza</a></div>
  </div>
  <div class="tabs" id="tabs" style="display:none;"></div>
  <div id="results"></div>
</div>
<div class="foot"><a href="../../main/index.html">World Home</a> · <a href="../gxy-newspaper/index.html">News</a> · <a href="../../members/index.html">Members</a><br><br>&copy; Gxygle — A Biking People World Service</div>
<script>
var INDEX=[],LASTQ="",FILTER="all";
var LBL={news:"News",business:"Business",store:"Store",station:"Transit",page:"Page"};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function rootUrl(u){return '../../'+u;}
function score(it,terms){var hay=(it.title+' '+it.section+' '+it.desc+' '+it.kw).toLowerCase();var s=0;for(var i=0;i<terms.length;i++){var t=terms[i];if(!t)continue;if(it.title.toLowerCase().indexOf(t)>=0)s+=12;if(it.section.toLowerCase().indexOf(t)>=0)s+=5;if(hay.indexOf(t)>=0)s+=2;}return s;}
function allMatches(q){var terms=q.toLowerCase().split(/\s+/);var sc=[];for(var i=0;i<INDEX.length;i++){var s=score(INDEX[i],terms);if(s>0)sc.push({it:INDEX[i],s:s});}sc.sort(function(a,b){return b.s-a.s;});return sc.map(function(x){return x.it;});}
function drawTabs(list){var counts={all:list.length};for(var i=0;i<list.length;i++)counts[list[i].type]=(counts[list[i].type]||0)+1;var order=["all","news","business","store","station","page"];var el=document.getElementById('tabs');el.innerHTML='';order.forEach(function(t){if(t!=="all"&&!counts[t])return;var b=document.createElement('button');b.className=(FILTER===t?'on':'');b.textContent=(t==="all"?"All":LBL[t])+" ("+(counts[t]||0)+")";b.onclick=function(){FILTER=t;render();};el.appendChild(b);});el.style.display='flex';}
function card(it){var meta=(it.section||LBL[it.type]||'')+(it.date?' · '+it.date:'');return '<div class="result"><div class="url"><span class="pill p-'+it.type+'">'+(LBL[it.type]||it.type)+'</span> gxyhockey.com/'+esc(it.url.replace("/index.html","").replace(".html",""))+'</div><a class="title" href="'+rootUrl(it.url)+'">'+esc(it.title)+'</a><div class="desc">'+esc(it.desc)+'</div><div class="meta">'+esc(meta)+'</div></div>';}
function render(){var list=allMatches(LASTQ);drawTabs(list);var shown=(FILTER==="all")?list:list.filter(function(x){return x.type===FILTER;});var el=document.getElementById('results');if(!shown.length){el.innerHTML='<div class="rstat">No results for <b>'+esc(LASTQ)+'</b>. Try more general keywords.</div>';return;}var h='<div class="rstat">About '+shown.length+' result'+(shown.length>1?'s':'')+' for <b>'+esc(LASTQ)+'</b> — searched all of Biking People World</div>';for(var i=0;i<shown.length;i++)h+=card(shown[i]);el.innerHTML=h;}
function doSearch(){var q=document.getElementById('q').value.trim();if(!q){document.getElementById('results').innerHTML='';document.getElementById('tabs').style.display='none';document.getElementById('tips').style.display='block';return;}LASTQ=q;FILTER="all";document.getElementById('tips').style.display='none';render();}
function qq(q){document.getElementById('q').value=q;doSearch();}
function feelingLucky(){var q=document.getElementById('q').value.trim();var list=allMatches(q||"world home");window.location.href=rootUrl(list.length?list[0].url:'main/index.html');}
document.getElementById('q').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
fetch('../../search-index.json?_='+Date.now()).then(function(r){return r.json();}).then(function(d){INDEX=d.items||[];}).catch(function(){});
// support ?/#q= from other pages (e.g. dashboard search box)
(function(){var h=location.hash.match(/q=([^&]+)/);if(h){var q=decodeURIComponent(h[1]);document.getElementById('q').value=q;/*wait for index*/var iv=setInterval(function(){if(INDEX.length){clearInterval(iv);doSearch();}},120);setTimeout(function(){clearInterval(iv);},4000);}})();
document.getElementById('q').focus();
</script>
<script src="../../assets/breaking.js" data-root="../../"></script>
<script src="../../assets/theme.js" data-root="../../" data-no-toggle="true"></script>
<script type="module" src="../../assets/authguard.js" data-root="../../"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biking People World — Enter</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:#0a0f1e;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;}
  .stars{position:fixed;inset:0;overflow:hidden;z-index:0;}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0.4;animation:twinkle 3s infinite alternate;}
  @keyframes twinkle{from{opacity:0.2;}to{opacity:0.8;}}
  .card{position:relative;z-index:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:2.5rem 2rem;width:360px;text-align:center;backdrop-filter:blur(10px);}
  .logo{font-size:2.5rem;margin-bottom:.5rem;}
  h1{color:#fff;font-size:1.4rem;font-weight:600;margin-bottom:.25rem;}
  .subtitle{color:rgba(255,255,255,0.5);font-size:.85rem;margin-bottom:2rem;}
  label{display:block;text-align:left;color:rgba(255,255,255,0.6);font-size:.8rem;margin-bottom:.4rem;letter-spacing:.05em;}
  input[type=password]{width:100%;padding:.65rem 1rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:1rem;outline:none;transition:border .2s;}
  input[type=password]:focus{border-color:rgba(96,165,250,0.6);}
  input[type=password]::placeholder{color:rgba(255,255,255,0.25);}
  .btn{width:100%;margin-top:1.2rem;padding:.7rem;background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:opacity .2s;}
  .btn:hover{opacity:.85;}
  .error{margin-top:.8rem;color:#f87171;font-size:.85rem;display:none;}
  .lock{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;background:rgba(59,130,246,0.15);border-radius:12px;margin-bottom:1rem;}
  .lock svg{width:24px;height:24px;stroke:#60a5fa;fill:none;stroke-width:2;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="card">
  <div class="lock">
    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <h1>Biking People World</h1>
  <p class="subtitle">Private world portal — authorized users only</p>
  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password">
  <button class="btn" onclick="unlock()">Enter World</button>
  <p class="error" id="err">Incorrect password. Try again.</p>
</div>
<script>
const HASH="3b5b9e71a42b7f5e6d1c8a9f2e4d0c7b1a3e5f9d2c4b6a8e0f2d4c6b8a0e2f4";
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return Math.abs(h).toString(16).padStart(8,'0');}
function unlock(){
  const pw=document.getElementById('pw').value;
  const correct=pw==="13h86m83RKP9$";
  if(correct){sessionStorage.setItem('bpw_auth','1');window.location.href='main/index.html';}
  else{document.getElementById('err').style.display='block';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
(function makeStars(){const c=document.getElementById('stars');for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';s.style.animationDuration=(2+Math.random()*3)+'s';c.appendChild(s);}})();
</script>
</body>
</html>

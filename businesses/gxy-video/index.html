<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GXY Video · Watch Instantly</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e8e8e8;color:#222;font-family:Arial,Helvetica,sans-serif;font-size:13px;}
a{text-decoration:none;color:#0b5ca8;}
a:hover{text-decoration:underline;}

/* ---------- red masthead ---------- */
.mast{background:#b9090b;background:linear-gradient(#c11119,#9b0508);border-bottom:1px solid #6b0405;}
.mast-in{max-width:1100px;margin:0 auto;padding:8px 14px;display:flex;align-items:center;gap:14px;}
.wordmark{font-family:"Arial Black",Arial,sans-serif;font-weight:900;font-size:26px;letter-spacing:-1px;
  color:#fff;text-transform:uppercase;line-height:1;
  text-shadow:2px 2px 0 #2b0203, 3px 3px 0 rgba(0,0,0,.35);
  transform:scaleY(1.18);display:inline-block;}
.wordmark .sm{font-size:11px;letter-spacing:.22em;font-weight:400;display:block;transform:scaleY(.85);
  text-shadow:none;margin-top:3px;color:#ffd9da;}
.mast-right{margin-left:auto;color:#fff;font-size:11px;}
.mast-right a{color:#fff;}

/* ---------- tab bar ---------- */
.tabs{background:#6e6e6e;background:linear-gradient(#8a8a8a,#5f5f5f);border-bottom:1px solid #3f3f3f;}
.tabs-in{max-width:1100px;margin:0 auto;padding:0 14px;display:flex;align-items:stretch;gap:2px;}
.tab{padding:8px 16px;color:#fff;font-size:12px;font-weight:bold;display:flex;align-items:center;}
.tab:hover{background:rgba(255,255,255,.12);text-decoration:none;color:#fff;}
.tab.on{background:#e8e8e8;color:#222;border-radius:4px 4px 0 0;}
.tab.on:hover{background:#e8e8e8;color:#222;}
.tabsearch{margin-left:auto;display:flex;align-items:center;padding:5px 0;}
.tabsearch input{border:1px solid #444;padding:4px 6px;font-size:11px;width:230px;}
.tabsearch button{border:1px solid #444;border-left:none;background:#ddd;padding:4px 8px;cursor:pointer;font-size:11px;}

/* ---------- genre strip ---------- */
.genres{background:#d4d4d4;border-bottom:1px solid #b5b5b5;}
.genres-in{max-width:1100px;margin:0 auto;padding:5px 14px;display:flex;gap:16px;font-size:11px;flex-wrap:wrap;}
.genres-in a{color:#333;font-weight:bold;}
.genres-in a.on{color:#b9090b;}

.page{max-width:1100px;margin:0 auto;padding:12px 14px 40px;}

/* ---------- recently watched panel ---------- */
.recent{background:#fff;border:1px solid #b5b5b5;margin-bottom:12px;}
.recent-h{padding:6px 10px;border-bottom:1px solid #ddd;font-weight:bold;font-size:12px;}
.recent-b{padding:8px 10px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;}
.recent-list{flex:1;min-width:260px;}
.recent-row{display:flex;align-items:center;gap:10px;padding:4px 0;border-bottom:1px solid #f0f0f0;}
.recent-row:last-child{border-bottom:none;}
.recent-row .t{flex:1;min-width:120px;}
.btn-resume{background:#1a4f8a;background:linear-gradient(#2b6fb8,#154a80);color:#fff;border:1px solid #0e3a66;padding:3px 14px;font-size:11px;font-weight:bold;cursor:pointer;}
.btn-resume:hover{background:linear-gradient(#3a80cc,#1a5691);}

/* ---------- row boxes ---------- */
.rowbox{background:#fff;border:1px solid #b5b5b5;margin-bottom:12px;}
.rowbox-h{display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid #ddd;background:#fafafa;}
.rowbox-h h2{font-size:13px;font-weight:bold;color:#222;}
.seeall{margin-left:auto;font-size:11px;font-weight:bold;}
.rowbox-b{display:flex;align-items:stretch;}
.taste{width:150px;flex:none;padding:10px;border-right:1px solid #eee;font-size:11px;color:#666;}
.taste b{display:block;color:#333;margin-bottom:5px;font-size:11px;}
.taste a{display:block;padding:1px 0;font-size:11px;}
.chev{flex:none;width:34px;background:none;border:none;font-size:30px;color:#c9c9c9;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
.chev:hover{color:#e8a33d;}
.strip{flex:1;display:flex;gap:12px;overflow-x:auto;padding:10px;scroll-behavior:smooth;
  scrollbar-width:none;-ms-overflow-style:none;}
.strip::-webkit-scrollbar{display:none;}

/* ---------- poster cards ---------- */
.item{width:118px;flex:none;text-align:center;}
.item .name{font-size:11px;color:#333;margin-bottom:4px;height:26px;overflow:hidden;line-height:1.2;}
.poster{width:118px;height:88px;object-fit:cover;border:1px solid #999;display:block;background:#333;cursor:pointer;}
.poster:hover{border-color:#b9090b;}
.btn-play{display:block;width:100%;margin-top:4px;background:linear-gradient(#2b6fb8,#154a80);
  color:#fff;border:1px solid #0e3a66;padding:3px 0;font-size:11px;font-weight:bold;cursor:pointer;}
.btn-play:hover{background:linear-gradient(#3a80cc,#1a5691);}
.rate{margin-top:3px;font-size:11px;color:#b9090b;letter-spacing:1px;}
.rate .off{color:#ccc;}
.notint{display:block;margin-top:2px;font-size:10px;color:#666;border:1px solid #ddd;background:#f4f4f4;padding:1px 0;}

/* ---------- modal ---------- */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.mbox{background:#fff;border:1px solid #666;width:100%;max-width:820px;}
.mbox-h{background:linear-gradient(#c11119,#9b0508);color:#fff;padding:6px 10px;font-weight:bold;font-size:12px;display:flex;}
.mbox-h button{margin-left:auto;background:none;border:none;color:#fff;font-size:16px;cursor:pointer;line-height:1;}
.mvid{position:relative;padding-top:56.25%;background:#000;}
.mvid iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.mmeta{padding:10px 12px;}
.mmeta h3{font-size:15px;margin-bottom:4px;}
.mmeta .mm{font-size:11px;color:#666;margin-bottom:6px;}
.mmeta p{font-size:12px;color:#333;line-height:1.5;}

.empty{background:#fff;border:1px solid #b5b5b5;padding:40px;text-align:center;color:#777;}
.foot{max-width:1100px;margin:0 auto;padding:14px;font-size:11px;color:#666;border-top:1px solid #c5c5c5;text-align:center;}
@media(max-width:700px){.taste{display:none;}.tabsearch input{width:120px;}}
</style>
</head>
<body>
<script>if(!sessionStorage.getItem('bpw_auth')){window.location.href='../../login.html';}</script>

<div class="mast"><div class="mast-in">
  <a href="index.html" class="wordmark">GXY Video<span class="sm">Biking People World</span></a>
  <div class="mast-right"><a href="../../members/index.html">Your Account</a> &amp; <a href="../../main/index.html">Help</a></div>
</div></div>

<div class="tabs"><div class="tabs-in">
  <a href="index.html" class="tab on">Watch Instantly</a>
  <a href="#" class="tab" onclick="setGenre('all');return false;">Browse All</a>
  <a href="#" class="tab" onclick="setGenre('MiniGame');return false;">Your Queue</a>
  <a href="../dave-n-busters/index.html" class="tab">&#9733; MiniGame Land</a>
  <div class="tabsearch">
    <input type="text" id="q" placeholder="Videos, builds, minigames, genres" oninput="doFilter()">
    <button onclick="doFilter()">&#128269;</button>
  </div>
</div></div>

<div class="genres"><div class="genres-in" id="genreStrip"></div></div>

<div class="page">
  <div class="recent" id="recent"></div>
  <div id="rows"></div>
</div>

<div class="foot">
  &copy; GXY Video &middot; A <a href="../../main/index.html">Biking People World</a> Channel &middot;
  <a href="../gxy-newspaper/index.html">News</a> &middot;
  <a href="../gxygo/index.html">GxyGo Transit</a>
</div>

<div class="modal" id="modal">
  <div class="mbox">
    <div class="mbox-h"><span id="mtitle">Now Playing</span><button onclick="closeModal()">&times;</button></div>
    <div class="mvid" id="mvid"></div>
    <div class="mmeta" id="mmeta"></div>
  </div>
</div>

<script>
var DATA={rows:[]}, GENRE='all', QUERY='';
function thumb(id){ return 'https://img.youtube.com/vi/'+id+'/hqdefault.jpg'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function stars(n){ n=Math.max(0,Math.min(5,n||0));
  return '\u2605'.repeat(n)+'<span class="off">'+'\u2605'.repeat(5-n)+'</span>'; }
function allVideos(){ var a=[]; DATA.rows.forEach(function(r){ r.videos.forEach(function(v){ a.push(v); }); }); return a; }

function genreList(){
  var g={}; allVideos().forEach(function(v){ if(v.genre) g[v.genre]=1; });
  return Object.keys(g).sort();
}
function drawGenres(){
  var html='<a href="#" class="'+(GENRE==='all'?'on':'')+'" onclick="setGenre(\'all\');return false;">Genres:</a>';
  genreList().forEach(function(g){
    html+='<a href="#" class="'+(GENRE===g?'on':'')+'" onclick="setGenre(\''+g+'\');return false;">'+esc(g)+'</a>';
  });
  document.getElementById('genreStrip').innerHTML=html;
}
function setGenre(g){ GENRE=g; drawGenres(); renderRows(); window.scrollTo({top:0,behavior:'smooth'}); }
function doFilter(){ QUERY=document.getElementById('q').value.trim().toLowerCase(); renderRows(); }

function matches(v){
  if(GENRE!=='all' && String(v.genre||'').toLowerCase().indexOf(GENRE.toLowerCase())<0) return false;
  if(QUERY && (v.title+' '+(v.desc||'')+' '+(v.genre||'')).toLowerCase().indexOf(QUERY)<0) return false;
  return true;
}

function renderRecent(){
  var vids=allVideos().slice(0,3);
  if(!vids.length){ document.getElementById('recent').style.display='none'; return; }
  var html='<div class="recent-h">You recently watched:</div><div class="recent-b"><div class="recent-list">';
  vids.forEach(function(v){
    html+='<div class="recent-row"><span class="t"><a href="#" onclick="openModal(\''+v.yt+'\');return false;">'+esc(v.title)+'</a></span>'
      +'<span class="rate">'+stars(v.rating)+'</span>'
      +'<button class="btn-resume" onclick="openModal(\''+v.yt+'\')">Resume</button></div>';
  });
  html+='</div></div>';
  document.getElementById('recent').innerHTML=html;
}

function item(v){
  return '<div class="item">'
    +'<div class="name">'+esc(v.title)+'</div>'
    +'<img class="poster" src="'+thumb(v.yt)+'" alt="'+esc(v.title)+'" loading="lazy" onclick="openModal(\''+v.yt+'\')">'
    +'<button class="btn-play" onclick="openModal(\''+v.yt+'\')">Play</button>'
    +'<div class="rate">'+stars(v.rating)+'</div>'
    +'<span class="notint">Not Interested</span>'
    +'</div>';
}

function renderRows(){
  var out='', shown=0;
  DATA.rows.forEach(function(r,i){
    var vids=r.videos.filter(matches);
    if(!vids.length) return;
    shown+=vids.length;
    var tags=[]; vids.forEach(function(v){ if(v.genre && tags.indexOf(v.genre)<0) tags.push(v.genre); });
    out+='<div class="rowbox"><div class="rowbox-h"><h2>'+esc(r.title)+'</h2>'
      +'<a class="seeall" href="#" onclick="return false;">See all &rsaquo;</a></div>'
      +'<div class="rowbox-b">'
      +'<div class="taste"><b>Your taste preferences created this row:</b>'
      + tags.slice(0,4).map(function(t){return '<a href="#" onclick="setGenre(\''+t+'\');return false;">'+esc(t)+'</a>';}).join('')
      +'</div>'
      +'<button class="chev" onclick="scrollRow('+i+',-1)">&#10094;</button>'
      +'<div class="strip" id="sl'+i+'">'+vids.map(item).join('')+'</div>'
      +'<button class="chev" onclick="scrollRow('+i+',1)">&#10095;</button>'
      +'</div></div>';
  });
  document.getElementById('rows').innerHTML = shown ? out : '<div class="empty">No videos match that search.</div>';
}
function scrollRow(i,d){ var s=document.getElementById('sl'+i); if(s) s.scrollBy({left:d*500,behavior:'smooth'}); }

function findVid(id){ return allVideos().filter(function(v){return v.yt===id;})[0]; }
function openModal(id){
  var v=findVid(id); if(!v) return;
  document.getElementById('mtitle').textContent='Watch Instantly \u2014 '+v.title;
  document.getElementById('mvid').innerHTML='<iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1" allow="accelerometer; autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
  document.getElementById('mmeta').innerHTML='<h3>'+esc(v.title)+'</h3>'
    +'<div class="mm"><span class="rate">'+stars(v.rating)+'</span> &nbsp; '+esc(v.year||'')+' &nbsp;&middot;&nbsp; '+esc(v.length||'')+' &nbsp;&middot;&nbsp; '+esc(v.genre||'')+'</div>'
    +'<p>'+esc(v.desc)+'</p>';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); document.getElementById('mvid').innerHTML=''; }
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeModal(); });

fetch('videos.json?_='+Date.now()).then(function(r){return r.json();}).then(function(d){
  DATA=d; drawGenres(); renderRecent(); renderRows();
}).catch(function(){ document.getElementById('rows').innerHTML='<div class="empty">Could not load videos.json</div>'; });
</script>
<script src="../../assets/breaking.js" data-root="../../"></script>
<script src="../../assets/theme.js" data-root="../../"></script>
<script type="module" src="../../assets/authguard.js" data-root="../../"></script>
</body>
</html>

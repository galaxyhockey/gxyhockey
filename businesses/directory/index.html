function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function score(b, terms){
  var hay = (b.name+' '+b.cat+' '+b.desc).toLowerCase();
  var s = 0;
  for(var i=0;i<terms.length;i++){
    var t = terms[i];
    if(!t) continue;
    if(b.name.toLowerCase().indexOf(t)>=0) s += 10;
    if(b.cat.toLowerCase().indexOf(t)>=0) s += 5;
    if(hay.indexOf(t)>=0) s += 2;
  }
  return s;
}

function results(list, q){
  var el = document.getElementById('results');
  if(!list.length){
    el.innerHTML = '<font face="arial,sans-serif" size=-1>Your search - <b>'+esc(q)+'</b> - did not match any businesses.<br><br>Suggestions:<br>- Make sure all words are spelled correctly.<br>- Try different keywords (e.g. <i>movies</i>, <i>hotel</i>, <i>trains</i>, <i>news</i>).</font>';
    return;
  }
  var html = '<font face="arial,sans-serif" size=-2 color="#666666">Results <b>1</b> - <b>'+list.length+'</b> of about <b>'+list.length+'</b> for <b>'+esc(q)+'</b>.</font><br><br>';
  for(var i=0;i<list.length;i++){
    var b = list[i];
    html += '<div style="margin-bottom:16px;">'
      + '<a href="'+b.url+'" style="font-family:arial,sans-serif;font-size:16px;color:#000099;text-decoration:underline;">'+esc(b.name)+'</a><br>'
      + '<font face="arial,sans-serif" size=-1 color="#000000">'+esc(b.desc)+'</font><br>'
      + '<font face="arial,sans-serif" size=-2 color="#008000">'+esc(b.url.replace("../","www.gxyhockey.com/").replace("/index.html",""))+'</font> '
      + '<font face="arial,sans-serif" size=-2 color="#666666">- '+esc(b.cat)+'</font>'
      + '</div>';
  }
  el.innerHTML = html;
}

function doSearch(){
  var q = document.f.q.value.trim();
  if(!q){ document.getElementById('results').innerHTML=''; return; }
  var terms = q.toLowerCase().split(/\s+/);
  var scored = [];
  for(var i=0;i<BIZ.length;i++){
    var s = score(BIZ[i], terms);
    if(s>0) scored.push({b:BIZ[i], s:s});
  }
  scored.sort(function(a,b){ return b.s-a.s; });
  results(scored.map(function(x){return x.b;}), q);
  document.getElementById('browseAll').style.display='none';
}

function feelingLucky(){
  var q = document.f.q.value.trim();
  if(!q){ window.location.href = BIZ[0].url; return; }
  var terms = q.toLowerCase().split(/\s+/);
  var best=null,bs=-1;
  for(var i=0;i<BIZ.length;i++){
    var s=score(BIZ[i],terms);
    if(s>bs){bs=s;best=BIZ[i];}
  }
  window.location.href = (best?best.url:BIZ[0].url);
}

function showAll(){
  var el=document.getElementById('results');
  var html='<font face="arial,sans-serif" size=-2 color="#666666">Browsing all <b>'+BIZ.length+'</b> businesses.</font><br><br>';

      +'<font face="arial,sans-serif" size=-2 color="#008000">'+esc(b.url.replace("../","www.gxyhockey.com/").replace("/index.html",""))+'</font> '
      +'<font face="arial,sans-serif" size=-2 color="#666666">- '+esc(b.cat)+'</font>'
      +'</div>';
  }
  el.innerHTML=html;
  document.getElementById('browseAll').style.display='none';
}

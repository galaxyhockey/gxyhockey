<SCRIPT LANGUAGE="JavaScript">
<!--
var INDEX = [];
var LASTQ = "";
var FILTER = "all";
var TYPE_LABELS = {news:"News", business:"Business", store:"Store", station:"Transit", page:"Page"};
var TYPE_ICON = {news:"[NEWS]", business:"[BIZ]", store:"[SHOP]", station:"[TRANSIT]", page:"[PAGE]"};

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function rootUrl(u){ return '../../'+u; }

function score(it, terms){
  var hay=(it.title+' '+it.section+' '+it.desc+' '+it.kw).toLowerCase();
  var s=0;
  for(var i=0;i<terms.length;i++){ var t=terms[i]; if(!t) continue;
    if(it.title.toLowerCase().indexOf(t)>=0) s+=12;
    if(it.section.toLowerCase().indexOf(t)>=0) s+=5;
    if(hay.indexOf(t)>=0) s+=2;
  }
  return s;
}

function allMatches(q){
  var terms=q.toLowerCase().split(/\s+/);
  var scored=[];
  for(var i=0;i<INDEX.length;i++){ var s=score(INDEX[i],terms); if(s>0) scored.push({it:INDEX[i],s:s}); }
  scored.sort(function(a,b){return b.s-a.s;});
  return scored.map(function(x){return x.it;});
}

function drawTabs(list){
  var counts={all:list.length};
  for(var i=0;i<list.length;i++){ counts[list[i].type]=(counts[list[i].type]||0)+1; }
  var order=["all","news","business","store","station","page"];
  var html='<font face="arial,sans-serif" size=-1>';
  for(var k=0;k<order.length;k++){
    var t=order[k]; if(t!=="all" && !counts[t]) continue;
    var lbl=(t==="all"?"All":TYPE_LABELS[t])+" ("+(counts[t]||0)+")";
    if(FILTER===t) html+='<b>'+lbl+'</b>';
    else html+='<a href="javascript:void(0)" onclick="setFilter(\''+t+'\')">'+lbl+'</a>';
    if(k<order.length-1) html+=' &nbsp;|&nbsp; ';
  }
  html+='</font>';
  var el=document.getElementById('tabs'); el.innerHTML=html; el.style.display='block';
}

function setFilter(t){ FILTER=t; renderResults(); }

function renderResults(){
  var list=allMatches(LASTQ);
  drawTabs(list);
  var shown = (FILTER==="all") ? list : list.filter(function(x){return x.type===FILTER;});
  var el=document.getElementById('results');
  if(!shown.length){
    el.innerHTML='<font face="arial,sans-serif" size=-1>Your search - <b>'+esc(LASTQ)+'</b> - did not match anything.<br><br>Suggestions: check spelling, try more general keywords.</font>';
    return;
  }
  var html='<font face="arial,sans-serif" size=-2 color="#666666">Results <b>1</b> - <b>'+shown.length+'</b> of about <b>'+shown.length+'</b> for <b>'+esc(LASTQ)+'</b>. (Searched all of Biking People World)</font><br><br>';
  for(var i=0;i<shown.length;i++){
    var it=shown[i];
    var meta=(it.section||TYPE_LABELS[it.type]||'')+(it.date?' &middot; '+it.date:'');
    html+='<div style="margin-bottom:15px;">'
      +'<font face="arial,sans-serif" size=-2 color="#777777">'+TYPE_ICON[it.type]+'</font> '
      +'<a href="'+rootUrl(it.url)+'" style="font-family:arial,sans-serif;font-size:16px;color:#000099;">'+esc(it.title)+'</a><br>'
      +'<font face="arial,sans-serif" size=-1 color="#000000">'+esc(it.desc)+'</font><br>'
      +'<font face="arial,sans-serif" size=-2 color="#008000">www.gxyhockey.com/'+esc(it.url.replace("/index.html","").replace(".html",""))+'</font> '
      +'<font face="arial,sans-serif" size=-2 color="#666666">- '+esc(meta)+'</font>'
      +'</div>';
  }
  el.innerHTML=html;
}

function doSearch(){
  var q=document.f.q.value.replace(/^\s+|\s+$/g,'');
  if(!q){ document.getElementById('results').innerHTML=''; document.getElementById('tabs').style.display='none'; document.getElementById('browseAll').style.display='block'; return; }
  LASTQ=q; FILTER="all";
  document.getElementById('browseAll').style.display='none';
  renderResults();
}
function qq(q){ document.f.q.value=q; doSearch(); }
function feelingLucky(){
  var q=document.f.q.value.replace(/^\s+|\s+$/g,'');
  var list=allMatches(q||"world home");
  window.location.href = rootUrl(list.length?list[0].url:'main/index.html');
}

// load the unified index
fetch('../../search-index.json?_='+Date.now())
  .then(function(r){ return r.json(); })
  .then(function(d){ INDEX=d.items||[]; })
  .catch(function(){ INDEX=[]; });

document.f.q.focus();
// -->
</SCRIPT>
